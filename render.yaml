# Render Blueprint: backend only. Frontend is deployed to GitHub Pages.
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: mountain-madness-backend
    runtime: python
    region: oregon

    # Repo root is project root; service runs from backend/
    rootDir: backend

    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT

    envVars:
      - key: PYTHON_VERSION
        value: "3.11.7"
      # Optional: for AI summaries on /api/demo/dashboard-ai
      - key: GEMINI_API_KEY
        sync: false
